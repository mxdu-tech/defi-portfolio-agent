name: Deploy DeFi Agent Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/defi-portfolio-agent
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            systemctl restart defi-agent
            systemctl status defi-agent --no-pager
